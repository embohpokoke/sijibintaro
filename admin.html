<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SIJI.Bintaro</title>
    <meta name="description" content="Dashboard admin untuk mengelola lamaran kerja dan feedback pelanggan SIJI.Bintaro.">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/logo90.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-dark: #0a0e27;
            --secondary-dark: #151b35;
            --tertiary-dark: #1e2447;
            --gold-accent: #d4a843;
            --gold-light: #f0d785;
            --text-white: #ffffff;
            --text-cream: #f8f6f0;
            --text-gray: #b8c1d4;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-dark);
            color: var(--text-white);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* Login Form */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .login-form {
            background-color: var(--secondary-dark);
            border-radius: 16px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            margin: 2rem;
            text-align: center;
        }
        
        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold-accent);
            margin-bottom: 2rem;
        }
        
        .form-input {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--tertiary-dark);
            border-radius: 8px;
            background-color: var(--tertiary-dark);
            color: var(--text-white);
            font-family: inherit;
            margin-bottom: 1rem;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--gold-accent);
        }
        
        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--gold-accent) 0%, var(--gold-light) 100%);
            color: var(--primary-dark);
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .error-message {
            color: #ef4444;
            margin-top: 1rem;
            display: none;
        }
        
        /* Dashboard */
        .dashboard {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .dashboard-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--gold-accent);
        }
        
        .logout-btn {
            padding: 0.5rem 1rem;
            background-color: transparent;
            color: var(--text-gray);
            border: 1px solid var(--text-gray);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .logout-btn:hover {
            color: var(--text-white);
            border-color: var(--text-white);
        }
        
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--tertiary-dark);
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 1rem 2rem;
            background: none;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .tab.active {
            color: var(--gold-accent);
            border-bottom-color: var(--gold-accent);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .card {
            background-color: var(--secondary-dark);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-cream);
            margin-bottom: 1rem;
        }
        
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        
        .table th,
        .table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--tertiary-dark);
        }
        
        .table th {
            background-color: var(--tertiary-dark);
            color: var(--text-cream);
            font-weight: 600;
        }
        
        .table tbody tr:hover {
            background-color: var(--tertiary-dark);
        }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge.baru { background-color: #3b82f6; color: white; }
        .badge.review { background-color: #f59e0b; color: white; }
        .badge.interview { background-color: #8b5cf6; color: white; }
        .badge.diterima { background-color: #10b981; color: white; }
        .badge.ditolak { background-color: #ef4444; color: white; }
        
        .stars {
            color: var(--gold-accent);
        }
        
        .btn-small {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            background-color: var(--gold-accent);
            color: var(--primary-dark);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 0.5rem;
        }
        
        .btn-small:hover {
            opacity: 0.8;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background-color: var(--secondary-dark);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold-accent);
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: var(--text-gray);
            font-size: 0.875rem;
        }
        
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        .filter-select {
            padding: 0.5rem;
            border: 1px solid var(--tertiary-dark);
            border-radius: 4px;
            background-color: var(--tertiary-dark);
            color: var(--text-white);
        }
        
        .hidden {
            display: none;
        }
        
        .loading {
            text-align: center;
            color: var(--text-gray);
            padding: 2rem;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                padding: 1rem;
            }
            
            .table {
                font-size: 0.875rem;
            }
            
            .table th,
            .table td {
                padding: 0.5rem 0.25rem;
            }
            
            .tabs {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div id="loginContainer" class="login-container">
        <div class="login-form">
            <h1 class="login-title">Admin Dashboard</h1>
            <input type="password" id="passwordInput" class="form-input" placeholder="Password" autocomplete="current-password">
            <button onclick="login()" class="btn">Login</button>
            <div id="loginError" class="error-message">Password salah!</div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="header">
            <h1 class="dashboard-title">Dashboard Admin SIJI.Bintaro</h1>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('lamaran')">Lamaran</button>
            <button class="tab" onclick="showTab('feedback')">Feedback</button>
            <button class="tab" onclick="showTab('statistik')">Statistik</button>
        </div>

        <!-- Lamaran Tab -->
        <div id="lamaranTab" class="tab-content active">
            <div class="card">
                <div class="card-title">Data Lamaran Kerja</div>
                
                <div class="filters">
                    <select id="statusFilter" class="filter-select" onchange="filterLamaran()">
                        <option value="">Semua Status</option>
                        <option value="baru">Baru</option>
                        <option value="review">Review</option>
                        <option value="interview">Interview</option>
                        <option value="diterima">Diterima</option>
                        <option value="ditolak">Ditolak</option>
                    </select>
                    <button onclick="exportLamaran()" class="btn-small">Export CSV</button>
                </div>
                
                <div id="lamaranLoading" class="loading">Loading...</div>
                <div id="lamaranTable"></div>
            </div>
        </div>

        <!-- Feedback Tab -->
        <div id="feedbackTab" class="tab-content">
            <div class="card">
                <div class="card-title">Data Feedback Pelanggan</div>
                
                <div class="filters">
                    <select id="ratingFilter" class="filter-select" onchange="filterFeedback()">
                        <option value="">Semua Rating</option>
                        <option value="5">5 Bintang</option>
                        <option value="4">4 Bintang</option>
                        <option value="3">3 Bintang</option>
                        <option value="2">2 Bintang</option>
                        <option value="1">1 Bintang</option>
                    </select>
                    <button onclick="exportFeedback()" class="btn-small">Export CSV</button>
                </div>
                
                <div id="feedbackLoading" class="loading">Loading...</div>
                <div id="feedbackTable"></div>
            </div>
        </div>

        <!-- Statistik Tab -->
        <div id="statistikTab" class="tab-content">
            <div class="stats-grid" id="statsGrid">
                <div class="loading">Loading...</div>
            </div>
            
            <div class="card">
                <div class="card-title">Rating Distribution</div>
                <div id="ratingChart"></div>
            </div>
        </div>
    </div>

    <script>
        let authToken = '';
        let lamaranData = [];
        let feedbackData = [];

        // Login
        function login() {
            const password = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('loginError');
            
            if (password === 'sijiadmin2026') {
                authToken = 'Bearer sijiadmin2026';
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadDashboardData();
            } else {
                errorDiv.style.display = 'block';
            }
        }

        function logout() {
            authToken = '';
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('passwordInput').value = '';
        }

        // Tab switching
        function showTab(tabName) {
            // Remove active class from all tabs and contents
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            // Add active class to selected tab and content
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
            
            // Load data if needed
            if (tabName === 'statistik') {
                loadStatistik();
            }
        }

        // Load dashboard data
        async function loadDashboardData() {
            await Promise.all([
                loadLamaran(),
                loadFeedback()
            ]);
        }

        // Load lamaran data
        async function loadLamaran() {
            try {
                const response = await fetch('/api/admin/lamaran', {
                    headers: { 'Authorization': authToken }
                });
                lamaranData = await response.json();
                renderLamaranTable();
            } catch (error) {
                console.error('Error loading lamaran:', error);
                document.getElementById('lamaranTable').innerHTML = '<p>Error loading data</p>';
            } finally {
                document.getElementById('lamaranLoading').style.display = 'none';
            }
        }

        // Render lamaran table
        function renderLamaranTable() {
            const statusFilter = document.getElementById('statusFilter').value;
            const filteredData = statusFilter ? 
                lamaranData.filter(item => item.status === statusFilter) : 
                lamaranData;

            const table = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>WhatsApp</th>
                            <th>Posisi</th>
                            <th>Tanggal</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredData.map(item => `
                            <tr>
                                <td>${item.nama}</td>
                                <td>${item.whatsapp}</td>
                                <td>${item.posisi}</td>
                                <td>${new Date(item.created_at).toLocaleDateString('id-ID')}</td>
                                <td><span class="badge ${item.status}">${item.status}</span></td>
                                <td>
                                    <button onclick="updateStatus(${item.id})" class="btn-small">Update Status</button>
                                    ${item.cv_path ? `<button onclick="downloadCV('${item.cv_path}')" class="btn-small">Download CV</button>` : ''}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('lamaranTable').innerHTML = table;
        }

        // Filter lamaran
        function filterLamaran() {
            renderLamaranTable();
        }

        // Update status
        async function updateStatus(id) {
            const newStatus = prompt('Update status ke:', 'baru');
            if (!newStatus) return;
            
            const validStatuses = ['baru', 'review', 'interview', 'diterima', 'ditolak'];
            if (!validStatuses.includes(newStatus)) {
                alert('Status tidak valid');
                return;
            }

            try {
                const response = await fetch(`/api/admin/lamaran/${id}/status`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': authToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    await loadLamaran();
                    alert('Status berhasil diupdate');
                } else {
                    throw new Error('Failed to update status');
                }
            } catch (error) {
                alert('Error updating status');
            }
        }

        // Download CV
        function downloadCV(cvPath) {
            const filename = cvPath.split('/').pop();
            window.open(`/api/admin/cv/${filename}`, '_blank');
        }

        // Load feedback data
        async function loadFeedback() {
            try {
                const response = await fetch('/api/admin/feedback', {
                    headers: { 'Authorization': authToken }
                });
                feedbackData = await response.json();
                renderFeedbackTable();
            } catch (error) {
                console.error('Error loading feedback:', error);
                document.getElementById('feedbackTable').innerHTML = '<p>Error loading data</p>';
            } finally {
                document.getElementById('feedbackLoading').style.display = 'none';
            }
        }

        // Render feedback table
        function renderFeedbackTable() {
            const ratingFilter = document.getElementById('ratingFilter').value;
            const filteredData = ratingFilter ? 
                feedbackData.filter(item => item.rating == ratingFilter) : 
                feedbackData;

            const table = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>Rating</th>
                            <th>Layanan</th>
                            <th>Komentar</th>
                            <th>Tanggal</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredData.map(item => `
                            <tr>
                                <td>${item.nama || 'Anonim'}</td>
                                <td><span class="stars">${'⭐'.repeat(item.rating)}</span> (${item.rating})</td>
                                <td>${item.layanan || '-'}</td>
                                <td>${item.komentar ? item.komentar.substring(0, 100) + (item.komentar.length > 100 ? '...' : '') : '-'}</td>
                                <td>${new Date(item.created_at).toLocaleDateString('id-ID')}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('feedbackTable').innerHTML = table;
        }

        // Filter feedback
        function filterFeedback() {
            renderFeedbackTable();
        }

        // Load statistik
        async function loadStatistik() {
            try {
                const response = await fetch('/api/admin/feedback/stats', {
                    headers: { 'Authorization': authToken }
                });
                const stats = await response.json();
                renderStatistik(stats);
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Render statistik
        function renderStatistik(stats) {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${stats.total_feedback}</div>
                    <div class="stat-label">Total Feedback</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.average_rating}</div>
                    <div class="stat-label">Rating Rata-rata</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${lamaranData.length}</div>
                    <div class="stat-label">Total Lamaran</div>
                </div>
            `;

            // Simple rating chart
            const ratingChart = document.getElementById('ratingChart');
            let chartHTML = '<div style="padding: 1rem;">';
            for (let i = 5; i >= 1; i--) {
                const count = stats.rating_distribution[i] || 0;
                const percentage = stats.total_feedback > 0 ? (count / stats.total_feedback * 100).toFixed(1) : 0;
                chartHTML += `
                    <div style="display: flex; align-items: center; margin-bottom: 0.5rem;">
                        <span style="width: 60px;">${i} ⭐</span>
                        <div style="flex: 1; background-color: var(--tertiary-dark); height: 20px; border-radius: 10px; margin: 0 1rem; overflow: hidden;">
                            <div style="width: ${percentage}%; height: 100%; background-color: var(--gold-accent); border-radius: 10px;"></div>
                        </div>
                        <span style="width: 60px; text-align: right;">${count} (${percentage}%)</span>
                    </div>
                `;
            }
            chartHTML += '</div>';
            ratingChart.innerHTML = chartHTML;
        }

        // Export functions
        function exportLamaran() {
            window.open('/api/admin/export/lamaran', '_blank');
        }

        function exportFeedback() {
            window.open('/api/admin/export/feedback', '_blank');
        }

        // Enter key login
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
