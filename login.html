<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIJI Bintaro — Login</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/images/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#D4A017;--gold-deep:#B8860B;--gold-light:#F5C842;
  --bg:#111;--surface:#1C1C1C;--border:#2A2A2A;
  --text:#F0EDE8;--text-muted:#6B6B6B;--text-secondary:#A0A0A0;
  --danger:#E55A4E;--danger-bg:rgba(229,90,78,0.12);
  --radius:12px;--font:'Inter',-apple-system,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

/* Background subtle pattern */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(212,160,23,0.08) 0%,transparent 60%);
  pointer-events:none;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:40px 36px;
  width:100%;max-width:380px;
  position:relative;
  box-shadow:0 24px 80px rgba(0,0,0,0.6);
}

/* Gold top accent */
.card::before{
  content:'';position:absolute;top:0;left:24px;right:24px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,160,23,0.6),transparent);
}

.logo{text-align:center;margin-bottom:32px}
.logo-icon{
  width:56px;height:56px;margin:0 auto 14px;
  background:linear-gradient(135deg,#D4A017,#B8860B);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;box-shadow:0 8px 24px rgba(212,160,23,0.25);
}
.logo-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.logo-sub{font-size:13px;color:var(--text-muted);margin-top:4px}

.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;letter-spacing:.3px}
input{
  width:100%;padding:12px 14px;
  background:#252525;border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;font-family:var(--font);
  outline:none;transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,160,23,0.12)}
input::placeholder{color:var(--text-muted)}

.password-wrap{position:relative}
.password-wrap input{padding-right:44px}
.toggle-pw{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--text-muted);
  font-size:16px;padding:4px;line-height:1;transition:color .2s;
}
.toggle-pw:hover{color:var(--gold)}

.btn{
  width:100%;padding:13px;margin-top:8px;
  background:linear-gradient(135deg,#D4A017,#B8860B);
  border:none;border-radius:8px;color:#fff;
  font-size:14px;font-weight:600;font-family:var(--font);
  cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.2px;
}
.btn:hover{opacity:.92}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.error{
  background:var(--danger-bg);border:1px solid rgba(229,90,78,0.25);
  border-radius:8px;padding:10px 12px;margin-top:12px;
  font-size:13px;color:var(--danger);display:none;align-items:center;gap:8px;
}
.error.show{display:flex}

.spinner{
  width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .6s linear infinite;display:none;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

.footer{text-align:center;margin-top:24px;font-size:12px;color:var(--text-muted)}

/* Mobile */
@media(max-width:480px){
  .card{padding:32px 24px;border-radius:16px}
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🧺</div>
    <div class="logo-title">SIJI Bintaro</div>
    <div class="logo-sub">Admin & Staff Portal</div>
  </div>

  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="form-group">
      <label for="username">USERNAME</label>
      <input type="text" id="username" name="username" placeholder="username"
             autocomplete="username" autocapitalize="none" spellcheck="false" autofocus>
    </div>
    <div class="form-group">
      <label for="password">PASSWORD</label>
      <div class="password-wrap">
        <input type="password" id="password" name="password" placeholder="••••••••"
               autocomplete="current-password">
        <button type="button" class="toggle-pw" onclick="togglePw()" id="toggleBtn">👁</button>
      </div>
    </div>

    <button type="submit" class="btn" id="submitBtn">
      <span id="btnText">Masuk</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="error" id="errorBox">
      <span>⚠️</span><span id="errorMsg">Username atau password salah</span>
    </div>
  </form>

  <div class="footer">SIJI.Bintaro · Bintaro Jaya</div>
</div>

<script>
function getNext() {
  const p = new URLSearchParams(window.location.search);
  return p.get('next') || '/dashboard/';
}

function togglePw() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('toggleBtn');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.textContent = '🙈';
  } else {
    inp.type = 'password';
    btn.textContent = '👁';
  }
}

function setLoading(v) {
  document.getElementById('submitBtn').disabled = v;
  document.getElementById('btnText').style.display = v ? 'none' : 'inline';
  document.getElementById('spinner').style.display = v ? 'block' : 'none';
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  document.getElementById('errorMsg').textContent = msg;
  box.classList.add('show');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}

async function doLogin(e) {
  e.preventDefault();
  hideError();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) {
    showError('Isi username dan password');
    return;
  }
  setLoading(true);
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password}),
      credentials: 'include',
    });
    if (res.ok) {
      window.location.href = getNext();
    } else {
      const data = await res.json().catch(() => ({}));
      showError(data.detail || 'Login gagal');
      setLoading(false);
    }
  } catch (err) {
    showError('Gagal terhubung ke server');
    setLoading(false);
  }
}

// If already logged in, redirect
fetch('/api/auth/verify', {credentials:'include'})
  .then(r => { if (r.ok) window.location.href = getNext(); })
  .catch(() => {});
</script>
</body>
</html>
